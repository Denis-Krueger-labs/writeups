  <path d="M165 66 C169 63 173 61 176 62" stroke="#7c3aed" stroke-width="0.6" fill="none" opacity="0.65"/>
  <path d="M166 62 C170 58 174 56 177 56" stroke="#7c3aed" stroke-width="0.55" fill="none" opacity="0.6"/>
  <path d="M167 57 C171 53 175 51 177 51" stroke="#7c3aed" stroke-width="0.5" fill="none" opacity="0.55"/>
  <path d="M168 52 C172 48 175 45 177 45" stroke="#7c3aed" stroke-width="0.45" fill="none" opacity="0.5"/>
  <path d="M169 47 C172 43 174 40 175 39" stroke="#7c3aed" stroke-width="0.4" fill="none" opacity="0.45"/>
