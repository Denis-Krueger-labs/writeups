<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none" class="moth-svg moth-hero" aria-hidden="true" role="img">
  <defs>
    <radialGradient id="wg1" cx="40%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4a1c7a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="wg2" cx="60%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4a1c7a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0.7"/>
