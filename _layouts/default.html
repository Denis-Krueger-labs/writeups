<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

  {% seo %}
</head>
<body>

  <!-- Moth particle canvas (background) -->
  <canvas id="mothCanvas" aria-hidden="true"></canvas>

  <!-- Rose petal rain -->
  <div id="petalRain" aria-hidden="true"></div>

  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/particles.js' | prepend: site.baseurl }}"></script>
  <script src="{{ '/assets/js/site.js' | prepend: site.baseurl }}"></script>

  {% if site.enable_visitor_counter and site.goatcounter_code != "" %}
  <script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {% endif %}
</body>
</html>
